name: Build and Push Docker Images to GHCR

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        service: [device-service, push-service, water-service]
        include:
          - service: device-service
            port: 8081
          - service: push-service
            port: 8082
          - service: water-service
            port: 8083

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle
      working-directory: ./microservices
      run: ./gradlew :${{ matrix.service }}:bootJar

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=,suffix=,format=short
          latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./microservices
        file: ./microservices/${{ matrix.service }}/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix=,suffix=,format=short
          latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./microservices/frontend
        file: ./microservices/frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:8083' }}

  verify-manifests:
    runs-on: ubuntu-latest
    needs: [build-and-push, build-frontend]
    if: github.event_name != 'pull_request'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Update K8s manifests with new image tag
      working-directory: ./microservices
      run: |
        # Get the short SHA for tagging
        SHA=$(git rev-parse --short HEAD)
        
        # Update image tags in all K8s manifests
        sed -i "s|image: drinkwater/device-service:.*|image: ghcr.io/${{ github.repository_owner }}/device-service:sha-${SHA}|g" k8s/10-device-service.yaml
        sed -i "s|image: drinkwater/push-service:.*|image: ghcr.io/${{ github.repository_owner }}/push-service:sha-${SHA}|g" k8s/20-push-service.yaml
        sed -i "s|image: drinkwater/water-service:.*|image: ghcr.io/${{ github.repository_owner }}/water-service:sha-${SHA}|g" k8s/30-water-service.yaml
        sed -i "s|image: drinkwater/frontend:.*|image: ghcr.io/${{ github.repository_owner }}/frontend:sha-${SHA}|g" k8s/40-frontend.yaml
        
        echo "Updated K8s manifests with new image tags"
        grep -A2 "image:" k8s/*.yaml | grep ghcr.io || echo "No ghcr.io images found"

    - name: Upload updated manifests as artifact
      uses: actions/upload-artifact@v4
      with:
        name: k8s-manifests-updated
        path: microservices/k8s/
