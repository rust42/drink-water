{{- if .Values.pushService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.pushService.name }}
  namespace: {{ include "drinkwater.namespace" . }}
  labels:
    {{- include "drinkwater.labels" . | nindent 4 }}
    app: {{ .Values.pushService.name }}
spec:
  replicas: {{ .Values.pushService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.pushService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.pushService.name }}
        {{- include "drinkwater.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Values.pushService.name }}
          image: "{{ include "drinkwater.imageRepository" . }}/{{ .Values.pushService.name }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.pushService.port }}
              name: http
          env:
            - name: SERVER_PORT
              value: {{ .Values.pushService.port | quote }}
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_DB_URL
            - name: DEVICE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: DEVICE_SERVICE_URL
            - name: PUSH_APNS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_APNS_TOPIC
            - name: PUSH_APNS_CERT_PATH
              value: {{ .Values.pushService.apns.certPath | quote }}
            - name: PUSH_APNS_CERT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apns-cert-secret
                  key: cert-password
            - name: PUSH_APNS_SANDBOX_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_APNS_SANDBOX_ENABLED
            - name: PUSH_APNS_TOKEN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_APNS_TOKEN_ENABLED
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: SPRING_PROFILES_ACTIVE
            - name: LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER
            {{- if .Values.pushService.kafka.enabled }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.pushService.kafka.bootstrapServers | quote }}
            {{- end }}
          volumeMounts:
            - name: apns-certs
              mountPath: /app/certs
              readOnly: true
          resources:
            {{- toYaml .Values.pushService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.pushService.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.pushService.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: apns-certs
          secret:
            secretName: apns-cert-secret
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.pushService.name }}
  namespace: {{ include "drinkwater.namespace" . }}
  labels:
    {{- include "drinkwater.labels" . | nindent 4 }}
    app: {{ .Values.pushService.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.pushService.name }}
  ports:
    - port: {{ .Values.pushService.port }}
      targetPort: {{ .Values.pushService.port }}
      name: http
{{- end }}
