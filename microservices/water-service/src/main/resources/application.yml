server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: water-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:waterdb}
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

# Device Service Configuration
device:
  service:
    url: ${DEVICE_SERVICE_URL:http://localhost:8081}

# Push Service Configuration  
push:
  service:
    url: ${PUSH_SERVICE_URL:http://localhost:8082}

logging:
  level:
    com.example.drinkwater: DEBUG
    org.springframework.cloud.openfeign: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
