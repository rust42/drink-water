server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: water-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:waterdb}
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    topic:
      water-intake-recorded: water-intake-recorded
      hydration-reminder: hydration-reminder

# Device Service Configuration
device:
  service:
    url: ${DEVICE_SERVICE_URL:http://device-service:8080}

# Push Service Configuration  
push:
  service:
    url: ${PUSH_SERVICE_URL:http://push-service:8080}

logging:
  level:
    com.example.drinkwater: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.kafka: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
