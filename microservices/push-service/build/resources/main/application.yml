server:
  port: 8082

spring:
  application:
    name: push-service
  datasource:
    url: jdbc:h2:mem:pushdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

# APNS Configuration - Certificate based (existing)
push:
  apns:
    cert:
      path: /Users/sandeep/Documents/CSR/PushNotification.p12
      password: sandycorolla
    # Token-based auth (p8 file) - alternative to certificate
    token:
      enabled: false
    topic: com.sk.drink-water
    sandbox:
      url: https://api.sandbox.push.apple.com/3/device
      enabled: true
    production:
      url: https://api.push.apple.com/3/device

# Device Service Configuration
device:
  service:
    url: http://localhost:8081

logging:
  level:
    com.example.drinkwater: DEBUG
    org.springframework.cloud.openfeign: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
