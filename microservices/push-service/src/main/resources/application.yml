server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: push-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:pushdb}
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: push-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.drinkwater.*
        spring.json.type.mapping: |
          device-registered:com.example.drinkwater.shared.event.DeviceRegisteredEvent
          water-intake-recorded:com.example.drinkwater.shared.event.WaterIntakeRecordedEvent
          hydration-reminder-request:com.example.drinkwater.shared.event.HydrationReminderRequestEvent
    topic:
      device-registered: device-registered
      water-intake-recorded: water-intake-recorded
      hydration-reminder: hydration-reminder

# APNS Configuration
# ---------------------------------------------------------------
# Two auth modes (mutually exclusive, controlled by token.enabled):
#
#   p8 / token-based (default):  PUSH_APNS_TOKEN_ENABLED=true
#     PUSH_APNS_TOKEN_KEY_ID    10-char key ID from Apple Developer portal
#     PUSH_APNS_TOKEN_TEAM_ID   10-char team ID from Apple Developer portal
#     PUSH_APNS_TOKEN_P8_PATH   local or pod-mounted path to the .p8 file
#
#   p12 / certificate-based:     PUSH_APNS_TOKEN_ENABLED=false
#     PUSH_APNS_CERT_PATH        path to the .p12 keystore
#     PUSH_APNS_CERT_PASSWORD    keystore password
#
# Local IntelliJ run: app starts without credentials; APNS calls will
# fail at runtime until valid credentials are supplied.
# ---------------------------------------------------------------
push:
  apns:
    cert:
      path: ${PUSH_APNS_CERT_PATH:/Users/sandeep/Documents/CSR/PushNotification.p12}
      password: ${PUSH_APNS_CERT_PASSWORD:sandycorolla}
    token:
      enabled: ${PUSH_APNS_TOKEN_ENABLED:true}
      key-id: ${PUSH_APNS_TOKEN_KEY_ID:}
      team-id: ${PUSH_APNS_TOKEN_TEAM_ID:}
      p8-path: ${PUSH_APNS_TOKEN_P8_PATH:}
    topic: ${PUSH_APNS_TOPIC:com.sk.drink-water}
    sandbox:
      url: ${PUSH_APNS_SANDBOX_URL:https://api.sandbox.push.apple.com/3/device}
      enabled: ${PUSH_APNS_SANDBOX_ENABLED:true}
    production:
      url: ${PUSH_APNS_PRODUCTION_URL:https://api.push.apple.com/3/device}

# Device Service Configuration
device:
  service:
    url: ${DEVICE_SERVICE_URL:http://localhost:8081}

logging:
  level:
    com.example.drinkwater: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.springframework.kafka: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
