server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:push-service}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:pushdb;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}

# APNS Configuration - Certificate based (existing)
push:
  apns:
    cert:
      path: ${PUSH_APNS_CERT_PATH:/app/certs/PushNotification.p12}
      password: ${PUSH_APNS_CERT_PASSWORD:sandycorolla}
    # Token-based auth (p8 file) - alternative to certificate
    token:
      enabled: ${PUSH_APNS_TOKEN_ENABLED:false}
      key-id: ${PUSH_APNS_TOKEN_KEY_ID:}
      team-id: ${PUSH_APNS_TOKEN_TEAM_ID:}
      p8-path: ${PUSH_APNS_TOKEN_P8_PATH:}
    topic: ${PUSH_APNS_TOPIC:com.sk.drink-water}
    sandbox:
      url: ${PUSH_APNS_SANDBOX_URL:https://api.sandbox.push.apple.com/3/device}
      enabled: ${PUSH_APNS_SANDBOX_ENABLED:true}
    production:
      url: ${PUSH_APNS_PRODUCTION_URL:https://api.push.apple.com/3/device}

# Device Service Configuration
device:
  service:
    url: ${DEVICE_SERVICE_URL:http://localhost:8081}

logging:
  level:
    com.example.drinkwater: ${LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER:DEBUG}
    org.springframework.cloud.openfeign: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_OPENFEIGN:DEBUG}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
