apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: drinkwater
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        server {
            listen 80;
            server_name localhost;

            # Device Service
            location /api/devices {
                proxy_pass http://device-service:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Push Service
            location /api/push-notifications {
                proxy_pass http://push-service:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Water Service
            location /api/water {
                proxy_pass http://water-service:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # API Documentation Aggregator (catches /api-docs and /swagger-ui)
            location /api-docs/ {
                proxy_pass http://docs-aggregator:8080/api-docs/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Swagger UI static assets
            location /swagger-ui/ {
                proxy_pass http://docs-aggregator:8080/swagger-ui/;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }

            # Health checks
            location /actuator/health {
                proxy_pass http://device-service:8080/actuator/health;
            }

            # Frontend - must be LAST (catch-all)
            # Let frontend's own nginx handle React Router SPA routing
            location / {
                proxy_pass http://frontend:8080;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-gateway
  namespace: drinkwater
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-gateway
  template:
    metadata:
      labels:
        app: nginx-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-gateway
  namespace: drinkwater
spec:
  # Use NodePort for local development (accessible on localhost:30080)
  # Change to LoadBalancer for cloud deployments
  type: NodePort
  selector:
    app: nginx-gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      name: http
