version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - drinkwater-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - drinkwater-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  device-service:
    build:
      context: .
      dockerfile: device-service/Dockerfile
    image: drinkwater/device-service:1.0.0
    container_name: device-service
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:device-db;DB_CLOSE_DELAY=-1
      - SPRING_H2_CONSOLE_ENABLED=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER=INFO
    networks:
      - drinkwater-network
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  push-service:
    build:
      context: .
      dockerfile: push-service/Dockerfile
    image: drinkwater/push-service:1.0.0
    container_name: push-service
    ports:
      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:push-db;DB_CLOSE_DELAY=-1
      - DEVICE_SERVICE_URL=http://device-service:8080
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PUSH_APNS_TOPIC=com.sk.drink-water
      - PUSH_APNS_CERT_PATH=/app/certs/PushNotification.p12
      - PUSH_APNS_CERT_PASSWORD=${APNS_CERT_PASSWORD:-sandycorolla}
      - PUSH_APNS_SANDBOX_ENABLED=true
      - PUSH_APNS_TOKEN_ENABLED=false
      - LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER=INFO
    volumes:
      - ${APNS_CERT_PATH:-/Users/sandeep/Documents/CSR/PushNotification.p12}:/app/certs/PushNotification.p12:ro
    networks:
      - drinkwater-network
    depends_on:
      device-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  water-service:
    build:
      context: .
      dockerfile: water-service/Dockerfile
    image: drinkwater/water-service:1.0.0
    container_name: water-service
    ports:
      - "8083:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:water-db;DB_CLOSE_DELAY=-1
      - DEVICE_SERVICE_URL=http://device-service:8080
      - PUSH_SERVICE_URL=http://push-service:8080
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER=INFO
    networks:
      - drinkwater-network
    depends_on:
      device-service:
        condition: service_healthy
      push-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  docs-aggregator:
    build:
      context: ./docs-aggregator
      dockerfile: Dockerfile
    image: drinkwater/docs-aggregator:1.0.0
    container_name: docs-aggregator
    ports:
      - "8085:8080"
    environment:
      - PORT=8080
      - DEVICE_SERVICE_URL=http://device-service:8080
      - PUSH_SERVICE_URL=http://push-service:8080
      - WATER_SERVICE_URL=http://water-service:8080
    networks:
      - drinkwater-network
    depends_on:
      device-service:
        condition: service_healthy
      push-service:
        condition: service_healthy
      water-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  drinkwater-network:
    driver: bridge
