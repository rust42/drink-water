version: '3.8'

services:
  device-service:
    build:
      context: .
      dockerfile: device-service/Dockerfile
    image: drinkwater/device-service:1.0.0
    container_name: device-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:device-db;DB_CLOSE_DELAY=-1
      - SPRING_H2_CONSOLE_ENABLED=true
      - LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER=INFO
    networks:
      - drinkwater-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  push-service:
    build:
      context: .
      dockerfile: push-service/Dockerfile
    image: drinkwater/push-service:1.0.0
    container_name: push-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:push-db;DB_CLOSE_DELAY=-1
      - DEVICE_SERVICE_URL=http://device-service:8081
      - PUSH_APNS_TOPIC=com.sk.drink-water
      - PUSH_APNS_CERT_PATH=/app/certs/PushNotification.p12
      - PUSH_APNS_CERT_PASSWORD=${APNS_CERT_PASSWORD:-sandycorolla}
      - PUSH_APNS_SANDBOX_ENABLED=true
      - PUSH_APNS_TOKEN_ENABLED=false
      - LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER=INFO
    volumes:
      # Mount APNS certificate from host (update path as needed)
      - ${APNS_CERT_PATH:-/Users/sandeep/Documents/CSR/PushNotification.p12}:/app/certs/PushNotification.p12:ro
    networks:
      - drinkwater-network
    depends_on:
      device-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  water-service:
    build:
      context: .
      dockerfile: water-service/Dockerfile
    image: drinkwater/water-service:1.0.0
    container_name: water-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:water-db;DB_CLOSE_DELAY=-1
      - DEVICE_SERVICE_URL=http://device-service:8081
      - PUSH_SERVICE_URL=http://push-service:8082
      - LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER=INFO
    networks:
      - drinkwater-network
    depends_on:
      device-service:
        condition: service_healthy
      push-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

networks:
  drinkwater-network:
    driver: bridge
