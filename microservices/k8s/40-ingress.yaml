apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drinkwater-ingress
  namespace: drinkwater
  annotations:
    traefik.ingress.kubernetes.io/router.priority: "1"
    traefik.ingress.kubernetes.io/router.middlewares: drinkwater-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: localhost
      http:
        paths:
          # API routes first (higher priority in Traefik)
          - path: /api/devices
            pathType: Prefix
            backend:
              service:
                name: device-service
                port:
                  number: 8081
          - path: /api/push-notifications
            pathType: Prefix
            backend:
              service:
                name: push-service
                port:
                  number: 8082
          - path: /api/water
            pathType: Prefix
            backend:
              service:
                name: water-service
                port:
                  number: 8083
          - path: /actuator/health
            pathType: Prefix
            backend:
              service:
                name: device-service
                port:
                  number: 8081
          # Frontend at root path LAST (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
---
# Alternative: Direct LoadBalancer for frontend if Ingress has issues
apiVersion: v1
kind: Service
metadata:
  name: frontend-lb
  namespace: drinkwater
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
