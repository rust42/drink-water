apiVersion: v1
kind: Secret
metadata:
  name: apns-cert-secret
  namespace: drinkwater
type: Opaque
stringData:
  # APNS Certificate Password
  cert-password: "sandycorolla"
  
  # To add the actual certificate, run:
  # kubectl create secret tls apns-tls-secret --cert=PushNotification.pem --key=PushNotification.key -n drinkwater
  # OR for p12:
  # kubectl create secret generic apns-p12-secret --from-file=PushNotification.p12 -n drinkwater
---
apiVersion: v1
kind: Secret
metadata:
  name: apns-p8-secret
  namespace: drinkwater
type: Opaque
stringData:
  # Token-based auth (p8 file content)
  # key-id: "YOUR_KEY_ID"
  # team-id: "YOUR_TEAM_ID"
  # To add the p8 file:
  # kubectl create secret generic apns-p8-secret --from-file=AuthKey.p8 -n drinkwater
