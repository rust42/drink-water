apiVersion: apps/v1
kind: Deployment
metadata:
  name: docs-aggregator
  namespace: drinkwater
  labels:
    app: docs-aggregator
    app.kubernetes.io/name: docs-aggregator
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docs-aggregator
  template:
    metadata:
      labels:
        app: docs-aggregator
        app.kubernetes.io/name: docs-aggregator
    spec:
      containers:
        - name: docs-aggregator
          image: drinkwater/docs-aggregator:1.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: DEVICE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: DEVICE_SERVICE_URL
            - name: PUSH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_SERVICE_URL
            - name: WATER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: WATER_SERVICE_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: docs-aggregator
  namespace: drinkwater
  labels:
    app: docs-aggregator
spec:
  selector:
    app: docs-aggregator
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
---
# NodePort service for direct access
apiVersion: v1
kind: Service
metadata:
  name: docs-aggregator-nodeport
  namespace: drinkwater
  labels:
    app: docs-aggregator
spec:
  selector:
    app: docs-aggregator
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30085
      name: http
  type: NodePort
