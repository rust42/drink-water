apiVersion: apps/v1
kind: Deployment
metadata:
  name: push-service
  namespace: drinkwater
  labels:
    app: push-service
    app.kubernetes.io/name: push-service
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: push-service
  template:
    metadata:
      labels:
        app: push-service
        app.kubernetes.io/name: push-service
    spec:
      containers:
        - name: push-service
          image: drinkwater/push-service:1.0.1
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SERVER_PORT
              value: "8082"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_DB_URL
            - name: DEVICE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: DEVICE_SERVICE_URL
            - name: PUSH_APNS_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_APNS_TOPIC
            - name: PUSH_APNS_CERT_PATH
              value: "/app/certs/PushNotification.p12"
            - name: PUSH_APNS_CERT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apns-cert-secret
                  key: cert-password
            - name: PUSH_APNS_SANDBOX_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_APNS_SANDBOX_ENABLED
            - name: PUSH_APNS_TOKEN_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_APNS_TOKEN_ENABLED
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: SPRING_PROFILES_ACTIVE
            - name: LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-broker:9092"
          volumeMounts:
            - name: apns-certs
              mountPath: /app/certs
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: apns-certs
          secret:
            secretName: apns-cert-secret
            # Uncomment if using p12 file directly:
            # items:
            #   - key: PushNotification.p12
            #     path: PushNotification.p12
---
apiVersion: v1
kind: Service
metadata:
  name: push-service
  namespace: drinkwater
  labels:
    app: push-service
spec:
  selector:
    app: push-service
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  type: ClusterIP
