apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: drinkwater

resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secrets.yaml
  - 04-docs-aggregator.yaml
  - 05-frontend.yaml
  - 10-device-service.yaml
  - 20-push-service.yaml
  - 30-water-service.yaml
  - 50-nginx-gateway.yaml

# Images managed by Kustomize
# For GitHub Actions (GHCR), the workflow updates these tags
# For local development, use local images with: kubectl apply -k k8s/ --kustomize
images:
  - name: frontend
    newTag: 1.2.1
  - name: device-service
    newTag: latest
  - name: push-service
    newTag: latest
  - name: water-service
    newTag: latest
  - name: docs-aggregator
    newTag: latest

commonLabels:
  app.kubernetes.io/managed-by: github-actions
  app.kubernetes.io/part-of: drinkwater
