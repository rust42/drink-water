apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: drinkwater

resources:
  - 00-namespace.yaml
  - 01-configmap.yaml
  - 02-secrets.yaml
  - 04-docs-aggregator.yaml
  - 05-frontend.yaml
  - 10-device-service.yaml
  - 20-push-service.yaml
  - 30-water-service.yaml
  - 50-nginx-gateway.yaml

# Image overrides — maps local placeholder names to GHCR images.
# CI (verify-manifests job) updates individual YAML files via sed.
# This section enables `kubectl apply -k k8s/` for local dev pointing at latest GHCR images.
images:
  - name: drinkwater/frontend
    newName: ghcr.io/rust42/frontend
    newTag: latest
  - name: drinkwater/device-service
    newName: ghcr.io/rust42/device-service
    newTag: latest
  - name: drinkwater/push-service
    newName: ghcr.io/rust42/push-service
    newTag: latest
  - name: drinkwater/water-service
    newName: ghcr.io/rust42/water-service
    newTag: latest
  - name: drinkwater/docs-aggregator
    newName: ghcr.io/rust42/docs-aggregator
    newTag: latest

commonLabels:
  app.kubernetes.io/managed-by: github-actions
  app.kubernetes.io/part-of: drinkwater
