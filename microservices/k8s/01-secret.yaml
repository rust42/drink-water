apiVersion: v1
kind: Secret
metadata:
  name: apns-cert-secret
  namespace: drinkwater
type: Opaque
stringData:
  # APNS certificate password
  # Replace with your actual password or use: echo -n 'your-password' | base64
  cert-password: ""

  # If using p12 file directly, base64 encode it:
  # cat PushNotification.p12 | base64 | tr -d '\n'
  # Then add it here as PushNotification.p12: <base64-encoded-content>
