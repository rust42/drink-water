apiVersion: apps/v1
kind: Deployment
metadata:
  name: water-service
  namespace: drinkwater
  labels:
    app: water-service
    app.kubernetes.io/name: water-service
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: water-service
  template:
    metadata:
      labels:
        app: water-service
        app.kubernetes.io/name: water-service
    spec:
      containers:
        - name: water-service
          image: drinkwater/water-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: WATER_DB_URL
            - name: DEVICE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: DEVICE_SERVICE_URL
            - name: PUSH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: PUSH_SERVICE_URL
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: SPRING_PROFILES_ACTIVE
            - name: LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER
              valueFrom:
                configMapKeyRef:
                  name: drinkwater-config
                  key: LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: water-service
  namespace: drinkwater
  labels:
    app: water-service
spec:
  selector:
    app: water-service
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  type: ClusterIP
