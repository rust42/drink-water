server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:device-service}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:devicedb;DB_CLOSE_DELAY=-1}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:true}
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:true}

logging:
  level:
    com.example.drinkwater: ${LOGGING_LEVEL_COM_EXAMPLE_DRINKWATER:DEBUG}
    org.springframework.cloud.openfeign: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_OPENFEIGN:DEBUG}

eureka:
  client:
    enabled: ${EUREKA_CLIENT_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
