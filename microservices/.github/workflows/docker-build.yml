name: Build and Push Docker Images to GHCR

on:
    push:
        branches: [ main, master ]
        tags: [ 'v*' ]
    pull_request:
        branches: [ main, master ]

env:
    REGISTRY: ghcr.io

jobs:
    # Job 1: Build artifacts and Push to Registry
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    # JAVA SERVICES (Gradle)
                    - service: device-service
                      type: java
                    - service: water-service
                      type: java
                    - service: push-service
                      type: java
                    # NODE SERVICES
                    - service: frontend
                      type: node
                      context: ./frontend
                    - service: docs-aggregator
                      type: node
                      context: ./docs-aggregator

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # --- Setup Java only for Gradle services ---
            - name: Set up JDK 21
              if: matrix.type == 'java'
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Build Java Jar
              if: matrix.type == 'java'
              run: ./gradlew :shared:jar :${{ matrix.service }}:bootJar -x ktlintCheck -x test

            # --- Setup Docker Buildx (Shared) ---
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=sha,prefix=sha-,format=short
                      latest

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: ${{ matrix.context }}
                  # Path to Dockerfile relative to repo root
                  file: ${{ matrix.service }}/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  # Enable GHA native caching for faster builds
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:8083' }}

    # Job 2: Update K8s manifests using Kustomize
    verify-manifests:
        runs-on: ubuntu-latest
        needs: [build-and-push]
        # Only run on pushes (to ensure valid SHA-tagged images exist)
        if: github.event_name != 'pull_request'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Kustomize
              uses: imranismail/setup-kustomize@v2

            - name: Update Kustomize Image Tags
              working-directory: ./k8s
              run: |
                  SHA=$(git rev-parse --short HEAD)
                  REGISTRY_PATH="ghcr.io/${{ github.repository_owner }}"

                  # Safely update image tags in kustomization.yaml
                  kustomize edit set image device-service=$REGISTRY_PATH/device-service:sha-${SHA}
                  kustomize edit set image water-service=$REGISTRY_PATH/water-service:sha-${SHA}
                  kustomize edit set image push-service=$REGISTRY_PATH/push-service:sha-${SHA}
                  kustomize edit set image frontend=$REGISTRY_PATH/frontend:sha-${SHA}
                  kustomize edit set image docs-aggregator=$REGISTRY_PATH/docs-aggregator:sha-${SHA}

            - name: Build Final Manifest
              working-directory: ./k8s
              run: kustomize build . > deployment.yaml

            - name: Upload Manifest Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: k8s-manifests-updated
                  path: k8s/deployment.yaml
