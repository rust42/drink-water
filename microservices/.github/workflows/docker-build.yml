name: Build and Push Docker Images to GHCR

on:
    push:
        branches: [ main, master ]
        tags: [ 'v*' ]
    pull_request:
        branches: [ main, master ]

env:
    REGISTRY: ghcr.io

jobs:
    # ─── Job 0: Detect which services have changed ─────────────────────────────
    # On PRs this skips unchanged services. On main/tags everything always builds.
    changes:
        runs-on: ubuntu-latest
        outputs:
            frontend: ${{ steps.filter.outputs.frontend }}
            docs-aggregator: ${{ steps.filter.outputs.docs-aggregator }}
            device-service: ${{ steps.filter.outputs.device-service }}
            water-service: ${{ steps.filter.outputs.water-service }}
            push-service: ${{ steps.filter.outputs.push-service }}
        steps:
            - uses: actions/checkout@v4
            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      frontend:
                        - 'frontend/**'
                      docs-aggregator:
                        - 'docs-aggregator/**'
                      device-service:
                        - 'device-service/**'
                        - 'shared/**'
                      water-service:
                        - 'water-service/**'
                        - 'shared/**'
                      push-service:
                        - 'push-service/**'
                        - 'shared/**'

    # ─── Job 1: Test Java services in parallel ────────────────────────────────
    # Re-enables the tests that were previously excluded with -x test.
    # Runs in parallel with the Docker build job so it doesn't add wall-clock time.
    test-java:
        runs-on: ubuntu-latest
        needs: changes
        if: |
            needs.changes.outputs.device-service == 'true' ||
            needs.changes.outputs.water-service == 'true'  ||
            needs.changes.outputs.push-service == 'true'
        strategy:
            fail-fast: false
            matrix:
                service: [device-service, water-service, push-service]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'gradle'
            - name: Run tests and ktlint
              run: |
                  ./gradlew :${{ matrix.service }}:test \
                            :${{ matrix.service }}:ktlintCheck \
                            --parallel --no-daemon
            - name: Publish test results
              uses: EnricoMi/publish-unit-test-result-action@v2
              if: always()
              with:
                  files: '**/build/test-results/**/*.xml'

    # ─── Job 2: Lint + type-check frontend ────────────────────────────────────
    lint-frontend:
        runs-on: ubuntu-latest
        needs: changes
        if: needs.changes.outputs.frontend == 'true'
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm ci
              working-directory: frontend
            - name: Lint
              run: npm run lint
              working-directory: frontend
            - name: Type check
              run: npx tsc --noEmit
              working-directory: frontend

    # ─── Job 3: Build & Push Docker images ────────────────────────────────────
    build-and-push:
        runs-on: ubuntu-latest
        needs: [changes, test-java, lint-frontend]
        # Run even when test/lint were skipped (no changes); fail only if they errored.
        if: always() && !cancelled() && !contains(needs.*.result, 'failure')
        permissions:
            contents: read
            packages: write
            security-events: write    # required for Trivy SARIF upload
            id-token: write           # required for Cosign keyless signing
        strategy:
            fail-fast: false
            matrix:
                include:
                    # JAVA SERVICES (Gradle)
                    - service: device-service
                      type: java
                    - service: water-service
                      type: java
                    - service: push-service
                      type: java
                    # NODE SERVICES
                    - service: frontend
                      type: node
                      context: ./frontend
                    - service: docs-aggregator
                      type: node
                      context: ./docs-aggregator

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            # ── Decide whether this service needs a build ─────────────────────
            # Tag pushes and main branch: always build everything.
            # PRs: only build services whose source files changed.
            - name: Check if service changed
              id: guard
              run: |
                  SERVICE="${{ matrix.service }}"
                  IS_TAG="${{ startsWith(github.ref, 'refs/tags/') }}"
                  IS_PUSH="${{ github.event_name == 'push' }}"

                  if [[ "$IS_TAG" == "true" || "$IS_PUSH" == "true" ]]; then
                    echo "should_build=true" >> $GITHUB_OUTPUT
                    echo "✅ $SERVICE — building (tag/main push)"
                    exit 0
                  fi

                  case "$SERVICE" in
                    frontend)        CHANGED="${{ needs.changes.outputs.frontend }}" ;;
                    docs-aggregator) CHANGED="${{ needs.changes.outputs.docs-aggregator }}" ;;
                    device-service)  CHANGED="${{ needs.changes.outputs.device-service }}" ;;
                    water-service)   CHANGED="${{ needs.changes.outputs.water-service }}" ;;
                    push-service)    CHANGED="${{ needs.changes.outputs.push-service }}" ;;
                    *)               CHANGED="false" ;;
                  esac

                  echo "should_build=$CHANGED" >> $GITHUB_OUTPUT
                  if [[ "$CHANGED" == "true" ]]; then
                    echo "✅ $SERVICE — building (changes detected in PR)"
                  else
                    echo "⏭️  $SERVICE — skipping (no changes in PR)"
                  fi

            # ── Java: build bootJar ───────────────────────────────────────────
            - name: Set up JDK 21
              if: matrix.type == 'java' && steps.guard.outputs.should_build == 'true'
              uses: actions/setup-java@v4
              with:
                  java-version: '21'
                  distribution: 'temurin'
                  cache: 'gradle'

            - name: Cache Gradle packages
              if: matrix.type == 'java' && steps.guard.outputs.should_build == 'true'
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.gradle/caches
                      ~/.gradle/wrapper
                      build
                  key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
                  restore-keys: |
                      ${{ runner.os }}-gradle-

            - name: Cache Maven packages
              if: matrix.type == 'java' && steps.guard.outputs.should_build == 'true'
              uses: actions/cache@v3
              with:
                  path: ~/.m2/repository
                  key: ${{ runner.os }}-maven-${{ hashFiles('**/build.gradle*') }}
                  restore-keys: |
                      ${{ runner.os }}-maven-

            - name: Build Java JAR
              if: matrix.type == 'java' && steps.guard.outputs.should_build == 'true'
              run: |
                  ./gradlew :shared:jar :${{ matrix.service }}:bootJar \
                    -x ktlintCheck \
                    -x test \
                    --parallel \
                    --max-workers=4 \
                    --no-daemon \
                    --build-cache \
                    --configuration-cache

            # Upload the fat JAR so the release job can attach it.
            # Only on tag pushes — no point keeping artifacts for every main commit.
            - name: Upload JAR artifact
              if: matrix.type == 'java' && steps.guard.outputs.should_build == 'true' && startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: jar-${{ matrix.service }}
                  # bootJar produces <service>-<version>.jar; -plain.jar is the thin jar — skip it
                  path: |
                      ${{ matrix.service }}/build/libs/*.jar
                      !${{ matrix.service }}/build/libs/*-plain.jar
                  retention-days: 1

            # ── Docker: shared setup ──────────────────────────────────────────
            - name: Set up Docker Buildx
              if: steps.guard.outputs.should_build == 'true'
              uses: docker/setup-buildx-action@v3

            - name: Install Cosign
              if: steps.guard.outputs.should_build == 'true'
              uses: sigstore/cosign-installer@v3

            - name: Log in to GitHub Container Registry
              if: steps.guard.outputs.should_build == 'true'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              if: steps.guard.outputs.should_build == 'true'
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=sha,prefix=sha-,format=short
                      latest

            - name: Build and push Docker image
              if: steps.guard.outputs.should_build == 'true'
              id: build
              uses: docker/build-push-action@v5
              with:
                  context: ${{ matrix.context }}
                  file: ${{ matrix.service }}/Dockerfile
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  platforms: linux/amd64,linux/arm64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  build-args: |
                      VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://localhost:8083' }}

            # ── Security: Trivy vulnerability scan (push only — image must exist) ──
            - name: Scan image for vulnerabilities
              if: steps.guard.outputs.should_build == 'true' && github.event_name != 'pull_request'
              uses: aquasecurity/trivy-action@master
              with:
                  image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
                  format: sarif
                  output: trivy-${{ matrix.service }}.sarif
                  severity: CRITICAL,HIGH
                  exit-code: '0'    # set to '1' to block merges on critical CVEs

            - name: Upload Trivy results to GitHub Security tab
              if: steps.guard.outputs.should_build == 'true' && github.event_name != 'pull_request' && always()
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: trivy-${{ matrix.service }}.sarif
                  category: trivy-${{ matrix.service }}

            # ── Security: Cosign keyless signing (push only) ──────────────────
            - name: Sign image with Cosign
              if: steps.guard.outputs.should_build == 'true' && github.event_name != 'pull_request'
              run: |
                  cosign sign --yes \
                    ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}
              env:
                  COSIGN_EXPERIMENTAL: 1

            # ── Build summary ─────────────────────────────────────────────────
            - name: Write job summary
              if: steps.guard.outputs.should_build == 'true'
              run: |
                  PUSHED="${{ github.event_name != 'pull_request' }}"
                  echo "## 🐳 \`${{ matrix.service }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
                  echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
                  echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Pushed to registry** | $PUSHED |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
                  echo "| **Tags** | $(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ' ') |" >> $GITHUB_STEP_SUMMARY

    # ─── Job 4: Update K8s manifests using Kustomize ──────────────────────────
    verify-manifests:
        runs-on: ubuntu-latest
        needs: [build-and-push]
        if: github.event_name != 'pull_request'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  fetch-depth: 0

            - name: Set up Git config
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Set up Kustomize
              uses: imranismail/setup-kustomize@v2

            - name: Update Kustomize Image Tags
              working-directory: ./k8s
              run: |
                  SHA=$(git rev-parse --short HEAD)
                  REGISTRY_PATH="ghcr.io/${{ github.repository_owner }}"

                  kustomize edit set image device-service=$REGISTRY_PATH/device-service:sha-${SHA}
                  kustomize edit set image water-service=$REGISTRY_PATH/water-service:sha-${SHA}
                  kustomize edit set image push-service=$REGISTRY_PATH/push-service:sha-${SHA}
                  kustomize edit set image frontend=$REGISTRY_PATH/frontend:sha-${SHA}
                  kustomize edit set image docs-aggregator=$REGISTRY_PATH/docs-aggregator:sha-${SHA}

            - name: Build Final Manifest
              working-directory: ./k8s
              run: |
                  kustomize build . > deployment.yaml
                  echo "Generated deployment.yaml with updated image tags"

            # Upload the rendered manifest so the release job can attach it.
            - name: Upload deployment manifest artifact
              if: startsWith(github.ref, 'refs/tags/')
              uses: actions/upload-artifact@v4
              with:
                  name: k8s-manifest
                  path: k8s/deployment.yaml
                  retention-days: 1

            - name: Commit and Push Updated Manifests
              working-directory: ./k8s
              run: |
                  git add deployment.yaml kustomization.yaml
                  git commit -m "ci: Update manifests with SHA-${{ github.sha }} image tags"
                  git push origin main || git push origin master

    # ─── Job 5: Create GitHub Release (tag pushes only) ───────────────────────
    # Downloads all JAR artifacts + the rendered k8s manifest, renames them with
    # the version tag, and publishes a GitHub Release with an auto-generated
    # changelog derived from commits since the previous tag.
    release:
        runs-on: ubuntu-latest
        needs: [build-and-push, verify-manifests]
        if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'
        permissions:
            contents: write   # needed to create the release and upload assets
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0   # full history so changelog covers all commits

            - name: Download all build artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets

            - name: Rename assets to include version tag
              run: |
                  TAG="${{ github.ref_name }}"
                  mkdir -p dist

                  # Rename each JAR: jar-<service>/<service>-*.jar → <service>-<TAG>.jar
                  for service in device-service water-service push-service; do
                    JAR=$(ls release-assets/jar-${service}/*.jar 2>/dev/null | head -1)
                    if [[ -n "$JAR" ]]; then
                      cp "$JAR" "dist/${service}-${TAG}.jar"
                      echo "📦 Packaged: ${service}-${TAG}.jar"
                    fi
                  done

                  # Rename k8s manifest
                  if [[ -f release-assets/k8s-manifest/deployment.yaml ]]; then
                    cp release-assets/k8s-manifest/deployment.yaml "dist/k8s-deployment-${TAG}.yaml"
                    echo "☸️  Packaged: k8s-deployment-${TAG}.yaml"
                  fi

                  echo "--- Release assets ---"
                  ls -lh dist/

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  # GitHub auto-generates release notes from PRs and commits
                  # since the previous tag — no manual changelog needed.
                  generate_release_notes: true
                  files: dist/*
                  body: |
                      ## 🐳 Docker Images

                      All images are signed with Cosign and published to GHCR:

                      ```bash
                      docker pull ghcr.io/${{ github.repository_owner }}/device-service:${{ github.ref_name }}
                      docker pull ghcr.io/${{ github.repository_owner }}/water-service:${{ github.ref_name }}
                      docker pull ghcr.io/${{ github.repository_owner }}/push-service:${{ github.ref_name }}
                      docker pull ghcr.io/${{ github.repository_owner }}/frontend:${{ github.ref_name }}
                      docker pull ghcr.io/${{ github.repository_owner }}/docs-aggregator:${{ github.ref_name }}
                      ```

                      Verify any image signature:
                      ```bash
                      cosign verify ghcr.io/${{ github.repository_owner }}/water-service:${{ github.ref_name }}
                      ```

                      ## ☸️ Deploy to Kubernetes

                      The rendered manifest with ${{ github.ref_name }} image tags is attached below.

                      ```bash
                      # Apply the full stack in one command
                      kubectl apply -f k8s-deployment-${{ github.ref_name }}.yaml
                      ```

                      Or pull and deploy with Kustomize directly:
                      ```bash
                      kustomize build k8s/ | kubectl apply -f -
                      ```
